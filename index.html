<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>에코 (Echo) - AI 사수</title>
  <style>
    /* 화면 디자인 스타일 */
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #EAEAE4; font-family: sans-serif; color: #2C362B; }
    .container { width: min(960px, 94%); margin: 50px auto; background: #F9F9F6; border-radius: 20px; padding: 40px; box-shadow: 0 20px 40px rgba(44, 54, 43, 0.08); }
    h1 { text-align: center; color: #536954; }
    .auth-box { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; background: #ffffff; padding: 30px; border-radius: 16px; border: 1px solid #D3CDAD; }
    input, select, textarea { height: 48px; padding: 0 16px; border: 1px solid #D3CDAD; border-radius: 10px; width: 100%; }
    textarea { min-height: 120px; padding: 16px; }
    button { border: none; border-radius: 10px; height: 48px; background: #536954; color: white; cursor: pointer; font-weight: 600; width: 100%; margin-top: 5px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #EAEAE4; border-radius: 12px; margin-bottom: 25px; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .badge.admin { background: #536954; color: #fff; }
    .badge.employee { background: #D3CDAD; color: #2C362B; }
    .section-card { background: #ffffff; padding: 30px; border-radius: 16px; border: 1px solid rgba(211, 205, 173, 0.4); margin-bottom: 25px; }
    .response-box { margin-top: 20px; padding: 20px; background: #F9F9F6; border-left: 4px solid #536954; white-space: pre-wrap; }
    .hidden { display: none !important; }
    .item { padding: 15px; background: #fff; border: 1px solid #D3CDAD; margin-bottom: 10px; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>에코 (Echo)</h1>
    <p style="text-align:center; color:#7A8579;">사내 지침 실시간 학습 기반 AI 사수</p>

    <section id="authSection">
      <div class="auth-box">
        <h2>시스템 접속</h2>
        <input id="emailInput" type="email" placeholder="회사 이메일 (관리자는 이메일에 admin 포함)" />
        <input id="passwordInput" type="password" placeholder="비밀번호 (6자리 이상)" />
        <button id="loginBtn">로그인</button>
        <button id="signupBtn" style="background:#D3CDAD; color:#2C362B;">신규 사원/관리자 등록</button>
      </div>
    </section>

    <section id="mainSection" class="hidden">
      <div class="top-bar">
        <div><span id="userEmail" style="font-weight:bold;"></span> <span id="userBadge" class="badge"></span>님</div>
        <button id="logoutBtn" style="width:90px; height:35px; background:#7A8579; margin:0;">로그아웃</button>
      </div>

      <div id="adminSection" class="section-card hidden">
        <h3>🏢 [관리자 메뉴] 사내 매뉴얼 등록/수정</h3>
        <textarea id="manualInput" placeholder="회사 정책이나 지침을 적어주세요."></textarea>
        <button id="saveManualBtn" style="width:150px; margin-top:10px;">지침 저장하기</button>
      </div>

      <div class="section-card">
        <h3>🌿 AI 사수에게 질문하기</h3>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
          <select id="voiceSelect"><option value="nova">nova (여성음성)</option><option value="echo">echo (남성음성)</option></select>
          <input id="speedInput" type="number" value="1.0" min="0.5" max="2.0" step="0.1" style="width:100px;" />
        </div>
        <textarea id="questionInput" placeholder="궁금한 사내 규정을 물어보세요."></textarea>
        <button id="askBtn" style="width:150px; margin-top:10px;">질문하기</button>
        <div id="status" style="text-align:center; margin:15px 0; color:#7A8579;"></div>

        <div id="answerWrapper" class="hidden">
          <div class="response-box" id="answerBox"></div>
          <div style="margin-top:15px;">
            <button id="listenBtn" style="background:#D3CDAD; color:#2C362B;">🔊 사수 목소리로 답변 듣기</button>
            <audio id="audioPlayer" controls class="hidden" style="width:100%; margin-top:10px;"></audio>
          </div>
        </div>
      </div>

      <div class="section-card">
        <h3>📋 나의 질문 이력</h3>
        <div id="dataList"></div>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getDatabase, ref, push, set, get, remove, onValue, off } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    // 파이어베이스 설정
    const firebaseConfig = {
      apiKey: "AIzaSyA3PvQN-XiP-_C0xIamRsNatD2xeFROfW8",
      authDomain: "minin-75f04.firebaseapp.com",
      projectId: "minin-75f04",
      storageBucket: "minin-75f04.firebasestorage.app",
      messagingSenderId: "1010800682481",
      appId: "1:1010800682481:web:5aef75289d6ac486f85050",
      measurementId: "G-WTS6DEKCHH"
};

  
    const CHAT_API_URL = 'https://script.google.com/macros/s/AKfycbxnBqZqW0Y04gf8Ig4503iBWap9TH5w2SxZ8YqCl6Q6oSn6XT2YlIgY5Sb48hxRotfp/exec'; 
    const TTS_API_URL = 'https://script.google.com/macros/s/AKfycbzdvSOfolTH37fRCwklEds7k0NAYBIr2z5GO7tE09YVI8OLicPPnq4B0g0dKXL28feq/exec';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    const authSection = document.getElementById('authSection'), mainSection = document.getElementById('mainSection'), adminSection = document.getElementById('adminSection');
    const emailInput = document.getElementById('emailInput'), passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn'), signupBtn = document.getElementById('signupBtn'), logoutBtn = document.getElementById('logoutBtn');
    const userEmail = document.getElementById('userEmail'), userBadge = document.getElementById('userBadge');
    const manualInput = document.getElementById('manualInput'), saveManualBtn = document.getElementById('saveManualBtn');
    const questionInput = document.getElementById('questionInput'), askBtn = document.getElementById('askBtn'), statusBox = document.getElementById('status');
    const answerWrapper = document.getElementById('answerWrapper'), answerBox = document.getElementById('answerBox'), listenBtn = document.getElementById('listenBtn'), audioPlayer = document.getElementById('audioPlayer');
    const voiceSelect = document.getElementById('voiceSelect'), speedInput = document.getElementById('speedInput'), dataList = document.getElementById('dataList');

    let currentUser = null, currentItemsRef = null, lastGeneratedAnswer = "";

    // 회원가입 (이메일에 admin이 포함되면 관리자 권한)
    signupBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim(), password = passwordInput.value.trim();
      if(!email || !password) return alert('입력창을 채워주세요.');
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        const role = email.includes('admin') ? 'admin' : 'employee';
        await set(ref(database, `users/${cred.user.uid}`), { email: email, role: role });
        alert('등록 성공!');
      } catch (err) { alert('오류: ' + err.message); }
    });

    // 로그인
    loginBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim(), password = passwordInput.value.trim();
      try { await signInWithEmailAndPassword(auth, email, password); } catch (err) { alert('로그인 실패: ' + err.message); }
    });

    logoutBtn.addEventListener('click', () => signOut(auth));

    // 로그인 상태 체크 및 권한 분리
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        const userSnap = await get(ref(database, `users/${user.uid}`));
        const userData = userSnap.val();
        const role = userData ? userData.role : 'employee';

        authSection.classList.add('hidden');
        mainSection.classList.remove('hidden');
        userEmail.textContent = user.email;

        if (role === 'admin') {
          userBadge.textContent = '관리자'; userBadge.className = 'badge admin';
          adminSection.classList.remove('hidden');
          const snap = await get(ref(database, 'company/manual'));
          if(snap.exists()) manualInput.value = snap.val();
        } else {
          userBadge.textContent = '사원'; userBadge.className = 'badge employee';
          adminSection.classList.add('hidden');
        }
        startRealtimeListener(user.uid);
      } else {
        currentUser = null;
        authSection.classList.remove('hidden'); mainSection.classList.add('hidden');
        if(currentItemsRef) off(currentItemsRef);
      }
    });

    // 관리자 매뉴얼 저장
    saveManualBtn.addEventListener('click', async () => {
      try {
        await set(ref(database, 'company/manual'), manualInput.value.trim());
        alert('매뉴얼이 저장되었습니다!');
      } catch (err) { alert('저장 실패: ' + err.message); }
    });

    // 사원 질문 및 AI 답변 생성
    askBtn.addEventListener('click', async () => {
      const question = questionInput.value.trim();
      if (!question) return alert('질문을 입력하세요.');
      try {
        askBtn.disabled = true; statusBox.textContent = '사수가 답변을 생각하는 중...';
        answerWrapper.classList.add('hidden'); audioPlayer.classList.add('hidden');

        const manualSnap = await get(ref(database, 'company/manual'));
        const currentManual = manualSnap.exists() ? manualSnap.val() : "등록된 사내 가이드라인이 없습니다.";

        const response = await fetch(CHAT_API_URL, {
          method: 'POST',
          body: JSON.stringify({ question: `[매뉴얼]\n${currentManual}\n\n[질문]\n${question}\n\n이 매뉴얼을 바탕으로 답해줘.` })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);

        lastGeneratedAnswer = data.answer || '오류 발생';
        answerBox.textContent = lastGeneratedAnswer;
        answerWrapper.classList.remove('hidden');
        statusBox.textContent = '완료';

        await set(push(ref(database, `users/${currentUser.uid}/items`)), { title: question, content: lastGeneratedAnswer, createdAt: new Date().toLocaleString() });
      } catch (err) { alert('에러: ' + err.message); statusBox.textContent = '실패'; } finally { askBtn.disabled = false; }
    });

    // 🔊 목소리 재생 기능 (가장 확실하고 안전한 원본 방식)
    listenBtn.addEventListener('click', async () => {
      if (!lastGeneratedAnswer) return;
      try {
        statusBox.textContent = '목so리 변환 중...'; listenBtn.disabled = true;
        const response = await fetch(TTS_API_URL, {
          method: 'POST',
          body: JSON.stringify({ type: 'tts', text: lastGeneratedAnswer, model: 'tts-1', voice: voiceSelect.value, speed: Number(speedInput.value) })
        });
        const data = await response.json();
        if (!data.audioBase64) throw new Error('음성 파일 획득 실패');
        
        audioPlayer.src = URL.createObjectURL(new Blob([new Uint8Array(atob(data.audioBase64).split('').map(c => c.charCodeAt(0)))], { type: 'audio/mpeg' }));
        audioPlayer.classList.remove('hidden'); audioPlayer.play();
        statusBox.textContent = '재생 중';
      } catch (err) { alert('음성 에러: ' + err.message); } finally { listenBtn.disabled = false; }
    });

    function startRealtimeListener(uid) {
      currentItemsRef = ref(database, `users/${uid}/items`);
      onValue(currentItemsRef, (snap) => {
        dataList.innerHTML = ''; const data = snap.val();
        if(!data) return;
        Object.entries(data).reverse().forEach(([id, item]) => {
          const div = document.createElement('div'); div.className = 'item';
          div.innerHTML = `<b>❓ Q. ${item.title}</b><p>💡 A. ${item.content}</p><small>📅 ${item.createdAt}</small>`;
          dataList.appendChild(div);
        });
      });
    }
  </script>
</body>
</html>
