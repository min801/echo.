<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>에코 (Echo) - 엔터프라이즈 AI 사수</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; background: #EAEAE4;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #2C362B;
    }
    .container {
      width: min(960px, 94%); margin: 50px auto; background: #F9F9F6;
      border-radius: 20px; padding: 40px; box-shadow: 0 20px 40px rgba(44, 54, 43, 0.08);
      border: 1px solid rgba(83, 105, 84, 0.1);
    }
    h1 { margin: 0 0 10px; text-align: center; font-size: 32px; color: #536954; font-weight: 800; }
    .subtitle { text-align: center; color: #7A8579; margin-bottom: 40px; font-size: 15px; }
    
    /* 인증 폼 */
    .auth-box { max-width: 400px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; background: #ffffff; padding: 30px; border-radius: 16px; border: 1px solid rgba(211, 205, 173, 0.5); }
    h2 { margin-top: 0; font-size: 20px; text-align: center; color: #2C362B; }
    
    input, select, textarea { height: 48px; padding: 0 16px; border: 1px solid #D3CDAD; border-radius: 10px; font-size: 15px; outline: none; background-color: #ffffff; color: #2C362B; transition: all 0.2s; }
    textarea { width: 100%; min-height: 120px; resize: vertical; padding: 16px; line-height: 1.6; }
    input:focus, select:focus, textarea:focus { border-color: #536954; box-shadow: 0 0 0 3px rgba(83, 105, 84, 0.15); }
    
    button { border: none; border-radius: 10px; padding: 0 20px; height: 48px; font-size: 15px; cursor: pointer; transition: all 0.2s; font-weight: 600; }
    button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.5; transform: none !important; }
    
    .login-btn { background: #536954; color: #FFFFFF; }
    .login-btn:hover { background: #435444; }
    .signup-btn { background: #D3CDAD; color: #2C362B; }
    .signup-btn:hover { background: #C5BE9E; }
    .logout-btn { background: #7A8579; color: #FFFFFF; font-size: 13px; height: 38px; }
    .save-btn { background: #536954; color: #FFFFFF; width: 160px; }
    .ask-btn { background: #536954; color: #FFFFFF; width: 140px; }
    .listen-btn { background: #D3CDAD; color: #2C362B; width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    .delete-btn { background: transparent; color: #C97A7A; border: 1px solid rgba(201, 122, 122, 0.4); padding: 0 12px; height: 32px; font-size: 12px; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-radius: 12px; background: #EAEAE4; margin-bottom: 25px; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-left: 6px; }
    .badge.admin { background: #536954; color: #fff; }
    .badge.employee { background: #D3CDAD; color: #2C362B; }

    /* 대시보드 구역 */
    .workspace { display: flex; flex-direction: column; gap: 30px; }
    .section-card { background: #ffffff; padding: 30px; border-radius: 16px; border: 1px solid rgba(211, 205, 173, 0.4); box-shadow: 0 4px 12px rgba(44, 54, 43, 0.02); }
    h3 { font-size: 18px; color: #536954; margin-top: 0; margin-bottom: 16px; font-weight: 700; }
    
    .control-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .control-row select { flex: 2; height: 42px; }
    .control-row input { flex: 1; height: 42px; text-align: center; }
    
    .response-box { margin-top: 20px; padding: 20px; background: #F9F9F6; border-radius: 12px; border-left: 4px solid #536954; border-top: 1px solid rgba(211, 205, 173, 0.3); line-height: 1.7; white-space: pre-wrap; }
    .audio-wrapper { margin-top: 16px; display: flex; flex-direction: column; gap: 12px; }
    audio { width: 100%; border-radius: 10px; }
    
    .list { display: flex; flex-direction: column; gap: 16px; max-height: 400px; overflow-y: auto; }
    .item { padding: 20px; border-radius: 14px; background: #ffffff; border: 1px solid rgba(211, 205, 173, 0.4); }
    .item-q { font-weight: 700; margin: 0 0 8px; color: #536954; }
    .item-a { margin: 0 0 14px; color: #4F5A4E; font-size: 14.5px; }
    .item-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12.5px; color: #929D91; border-top: 1px dashed rgba(211, 205, 173, 0.5); padding-top: 12px; }
    
    .status { min-height: 20px; color: #7A8579; font-size: 13.5px; margin: 12px 0; text-align: center; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>에코 (Echo)</h1>
    <div class="subtitle">사내 지침 실시간 학습 기반 AI 사수 시스템</div>

    <section id="authSection">
      <div class="auth-box">
        <h2>로그인 / 회원가입</h2>
        <input id="emailInput" type="email" placeholder="회사 이메일 계정" />
        <input id="passwordInput" type="password" placeholder="비밀번호 (6자리 이상)" />
        <button class="login-btn" id="loginBtn">시스템 접속 (로그인)</button>
        <button class="signup-btn" id="signupBtn">신규 사원/관리자 등록</button>
      </div>
    </section>

    <section id="mainSection" class="hidden">
      <div class="top-bar">
        <div class="user-info">
          <span id="userEmail" style="font-weight: 600;"></span> 
          <span id="userBadge" class="badge"></span>님 환영합니다.
        </div>
        <button class="logout-btn" id="logoutBtn">로그아웃</button>
      </div>

      <div class="workspace">
        <div id="adminSection" class="section-card hidden">
          <h3>🏢 [관리자 권한] 사내 지침 및 매뉴얼 데이터 업데이트</h3>
          <p style="font-size:13.5px; color:#7A8579; margin-top:-10px; margin-bottom:15px;">
            여기에 입력된 내용을 기반으로 AI 사수가 사원들에게 답변을 제공합니다. (지침, 정산 양식, 이벤트 등)
          </p>
          <textarea id="manualInput" placeholder="예시:&#10;[근태 지침] 우리 회사는 시차출퇴근제를 운영하며 8시~10시 사이에 자율 출근합니다.&#10;[사내 이벤트] 2026년 상반기 워크숍은 6월 20일 제주도에서 진행됩니다."></textarea>
          <div style="text-align: right; margin-top: 10px;">
            <button class="save-btn" id="saveManualBtn">지침 저장 및 동기화</button>
          </div>
        </div>

        <div class="section-card">
          <h3>🌿 AI 사수에게 물어보기</h3>
          <div class="control-row">
            <select id="voiceSelect">
              <option value="nova">nova (친절한 여성 음성)</option>
              <option value="echo">echo (차분한 남성 음성)</option>
            </select>
            <input id="speedInput" type="number" min="0.5" max="2.0" step="0.1" value="1.0" />
          </div>
          <textarea id="questionInput" placeholder="궁금한 사내 규정이나 프로세스를 물어보세요."></textarea>
          <div style="text-align: right; margin-top: 14px;">
            <button class="ask-btn" id="askBtn">질문 던지기</button>
          </div>
          <div id="status" class="status"></div>

          <div id="answerWrapper" class="hidden">
            <div class="response-box" id="answerBox"></div>
            <div class="audio-wrapper">
              <button class="listen-btn" id="listenBtn">🔊 사수 목소리로 답변 듣기</button>
              <audio id="audioPlayer" controls class="hidden"></audio>
            </div>
          </div>
        </div>

        <div class="section-card">
          <h3>📋 나의 질문 이력</h3>
          <div id="dataList" class="list"></div>
        </div>
      </div>
    </section>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { getDatabase, ref, push, set, get, remove, onValue, off } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

    // 요청하신 파이어베이스 정보 적용 완료
    const firebaseConfig = {
      apiKey: "AIzaSyD8B9o1DPJeJasnREQayA40WIkhxrBCTnw",
      authDomain: "buyeo-35213.firebaseapp.com",
      databaseURL: "https://buyeo-35213-default-rtdb.firebaseio.com",
      projectId: "buyeo-35213",
      storageBucket: "buyeo-35213.firebasestorage.app",
      messagingSenderId: "696473893879",
      appId: "1:696473893879:web:283435b41ab87859a7ccf2",
      measurementId: "G-BNSGWZN7T7"
};

    const CHAT_API_URL = 'https://script.google.com/macros/s/AKfycby3JmnemF5mZ1DnfdVs44d1ime6hdRDIR5IwQqwVFTcyTR5V_QOLGk-m0ArJsgrEUQ-7g/exec';
    const TTS_API_URL = 'https://script.google.com/macros/s/AKfycbwbl9WemU0Z1_1tVsxF-Kl9r1ktVX-X1D2yH6kEZKm8chjEeTI8Xzx2yHOk72aS5NCR/exec';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // DOM 요소 링크
    const authSection = document.getElementById('authSection'), mainSection = document.getElementById('mainSection'), adminSection = document.getElementById('adminSection');
    const emailInput = document.getElementById('emailInput'), passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn'), signupBtn = document.getElementById('signupBtn'), logoutBtn = document.getElementById('logoutBtn');
    const userEmail = document.getElementById('userEmail'), userBadge = document.getElementById('userBadge');
    const manualInput = document.getElementById('manualInput'), saveManualBtn = document.getElementById('saveManualBtn');
    const questionInput = document.getElementById('questionInput'), askBtn = document.getElementById('askBtn'), statusBox = document.getElementById('status');
    const answerWrapper = document.getElementById('answerWrapper'), answerBox = document.getElementById('answerBox'), listenBtn = document.getElementById('listenBtn'), audioPlayer = document.getElementById('audioPlayer');
    const voiceSelect = document.getElementById('voiceSelect'), speedInput = document.getElementById('speedInput'), dataList = document.getElementById('dataList');

    let currentUser = null, currentItemsRef = null, lastGeneratedAnswer = "";

    // 회원가입 시 권한을 분리하여 파이어베이스 DB에 함께 기록
    signupBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim(), password = passwordInput.value.trim();
      if(!email || !password) return alert('정보를 입력하세요.');
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        
        // 이메일에 'admin'이 포함되면 관리자 권한 부여 (실제 서비스 시에는 도메인이나 선택 박스로 처리 가능)
        const role = email.includes('admin') ? 'admin' : 'employee';
        
        await set(ref(database, `users/${cred.user.uid}`), {
          email: email,
          role: role
        });
        alert(`가입 성공! 귀하의 권한은 [${role === 'admin' ? '관리자' : '일반사원'}] 입니다.`);
      } catch (err) { alert('가입 오류: ' + err.message); }
    });

    loginBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim(), password = passwordInput.value.trim();
      if(!email || !password) return alert('로그인 정보를 입력하세요.');
      try { await signInWithEmailAndPassword(auth, email, password); } catch (err) { alert('로그인 실패: ' + err.message); }
    });

    logoutBtn.addEventListener('click', () => signOut(auth));

    // 유저 로그인 상태 모니터링 및 권한 분기 분점
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        
        // 데이터베이스에서 해당 사용자의 권한(role) 가져오기
        const userSnap = await get(ref(database, `users/${user.uid}`));
        const userData = userSnap.val();
        const role = userData ? userData.role : 'employee';

        authSection.classList.add('hidden');
        mainSection.classList.remove('hidden');
        userEmail.textContent = user.email;

        if (role === 'admin') {
          userBadge.textContent = '관리자';
          userBadge.className = 'badge admin';
          adminSection.classList.remove('hidden'); // 관리자 창 켜기
          loadCompanyManual(); // 저장되어 있던 기존 매뉴얼 불러오기
        } else {
          userBadge.textContent = '일반 사원';
          userBadge.className = 'badge employee';
          adminSection.classList.add('hidden'); // 사원에게는 숨김
        }

        startRealtimeListener(user.uid);
      } else {
        currentUser = null;
        authSection.classList.remove('hidden');
        mainSection.classList.add('hidden');
        stopRealtimeListener();
      }
    });

    // 관리자: 사내 매뉴얼 저장 기능
    saveManualBtn.addEventListener('click', async () => {
      const text = manualInput.value.trim();
      try {
        saveManualBtn.disabled = true;
        // 회사 공통 저장소 공간에 매뉴얼 텍스트 기록
        await set(ref(database, 'company/manual'), text);
        alert('사내 지침이 실시간 데이터베이스에 성공적으로 업데이트되었습니다!');
      } catch (err) { alert('저장 실패: ' + err.message); } finally { saveManualBtn.disabled = false; }
    });

    async function loadCompanyManual() {
      const snap = await get(ref(database, 'company/manual'));
      if(snap.exists()) manualInput.value = snap.val();
    }

    // 사원: AI에게 질문하기 (현재 등록된 최신 매뉴얼을 함께 긁어와 구글 스크립트에 전달)
    async function askEchoMentor() {
      const question = questionInput.value.trim();
      if (!question) return alert('내용을 적어주세요.');

      try {
        setLoading(true, '최신 사내 매뉴얼을 참고하여 사수가 답변을 구성 중입니다...');
        answerWrapper.classList.add('hidden');

        // DB에서 최신 사내 매뉴얼 가져오기
        const manualSnap = await get(ref(database, 'company/manual'));
        const currentManual = manualSnap.exists() ? manualSnap.val() : "등록된 사내 가이드라인이 없습니다.";

        // 질문과 매뉴얼을 조합하여 프록시 서버(구글 웹앱)로 전송
        // 구글 앱스 스크립트가 이 매뉴얼 텍스트를 OpenAI 프롬프트에 동봉하여 처리하게 됨
        const response = await fetch(CHAT_API_URL, {
          method: 'POST',
          body: JSON.stringify({ 
            question: `[사내 참고 매뉴얼]\n${currentManual}\n\n[질문]\n${question}\n\n위 참고 매뉴얼을 절대적으로 신뢰하여 질문에 정중히 답변해줘.` 
          })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error);

        const answer = data.answer || '답변 생성 오류';
        answerBox.textContent = answer;
        lastGeneratedAnswer = answer;
        answerWrapper.classList.remove('hidden');
        statusBox.textContent = '답변 작성 완료';

        const itemsRef = ref(database, `users/${currentUser.uid}/items`);
        await set(push(itemsRef), { title: question, content: answer, createdAt: new Date().toLocaleString('ko-KR') });
      } catch (err) {
        alert('오류가 발생했습니다: ' + err.message);
        statusBox.textContent = '실패';
      } finally { setLoading(false, ''); }
    }

    askBtn.addEventListener('click', askEchoMentor);

    // (기존 TTS 오디오 변환 및 이력 출력 로직은 동일하게 유지)
    listenBtn.addEventListener('click', async () => {
      if (!lastGeneratedAnswer) return;
      try {
        statusBox.textContent = '목소리 렌더링 중...'; listenBtn.disabled = true;
        const response = await fetch(TTS_API_URL, {
          method: 'POST',
          body: JSON.stringify({ type: 'tts', text: lastGeneratedAnswer, model: 'tts-1', voice: voiceSelect.value, speed: Number(speedInput.value) })
        });
        const data = await response.json();
        if (!data.audioBase64) throw new Error('음성 획득 실패');
        audioPlayer.src = URL.createObjectURL(new Blob([new Uint8Array(atob(data.audioBase64).split('').map(c => c.charCodeAt(0)))], { type: 'audio/mpeg' }));
        audioPlayer.classList.remove('hidden'); audioPlayer.play();
        statusBox.textContent = '재생 중';
      } catch (err) { alert(err.message); } finally { listenBtn.disabled = false; }
    });

    function startRealtimeListener(uid) {
      currentItemsRef = ref(database, `users/${uid}/items`);
      onValue(currentItemsRef, (snap) => {
        dataList.innerHTML = '';
        const data = snap.val();
        if(!data) { dataList.innerHTML = '<div style="text-align:center; padding:20px; color:#7A8579;">질문 이력이 없습니다.</div>'; return; }
        Object.entries(data).reverse().forEach(([id, item]) => {
          const div = document.createElement('div'); div.className = 'item';
          div.innerHTML = `<p class="item-q">❓ Q. ${item.title}</p><p class="item-a">💡 A. ${item.content}</p><div class="item-meta"><span>📅 ${item.createdAt}</span><button class="delete-btn" onclick="deleteHistory('${id}')">삭제</button></div>`;
          dataList.appendChild(div);
        });
      });
    }
    function stopRealtimeListener() { if(currentItemsRef) off(currentItemsRef); }
    window.deleteHistory = async function(id) { if(confirm('삭제하시겠습니까?')) await remove(ref(database, `users/${currentUser.uid}/items/${id}`)); };
    function setLoading(isLoading, text) { askBtn.disabled = isLoading; statusBox.textContent = text; }
  </script>
</body>
</html>
